<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShipsKart Parser — Test Client</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="ShipsKart Parser">
          <rect width="28" height="28" rx="6" fill="#01696f"/>
          <path d="M6 18 L10 10 L14 15 L18 8 L22 18 Z" stroke="white" stroke-width="2" fill="none" stroke-linejoin="round"/>
          <rect x="6" y="19" width="16" height="2.5" rx="1.25" fill="white" opacity="0.7"/>
        </svg>
        <span>ShipsKart <strong>Parser</strong></span>
      </div>
      <div class="header-right">
        <span id="health-badge" class="badge badge--checking">checking...</span>
        <button class="btn-icon" data-theme-toggle aria-label="Toggle theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="main">

    <section class="card" id="upload-section">
      <h2 class="card-title">Upload Document</h2>
      <p class="card-desc">Accepts Excel (.xlsx .xlsm), Word (.docx .doc), or PDF (.pdf)</p>

      <div class="upload-zone" id="drop-zone">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p>Drag &amp; drop a file here, or <label class="link" for="file-input">browse</label></p>
        <span id="file-name" class="file-name"></span>
        <input type="file" id="file-input" accept=".xlsx,.xlsm,.docx,.doc,.pdf" hidden />
      </div>

      <div class="controls">
        <div class="control-group">
          <label for="top-n">Top N matches per item</label>
          <input type="number" id="top-n" value="3" min="1" max="20" />
        </div>
        <div class="control-group">
          <label for="base-url">API base URL</label>
          <input type="text" id="base-url" value="http://localhost:8000" />
        </div>
      </div>

      <button class="btn btn--primary" id="submit-btn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Parse &amp; Match
      </button>
    </section>

    <div id="status-bar" class="status-bar hidden"></div>

    <section class="card hidden" id="summary-section">
      <h2 class="card-title">Summary</h2>
      <div class="summary-grid" id="summary-grid"></div>
    </section>

    <section class="card hidden" id="results-section">
      <div class="results-header">
        <h2 class="card-title">Results</h2>
        <div class="results-controls">
          <input type="text" id="search-input" placeholder="Filter items..." class="search-input" />
          <select id="score-filter" class="select">
            <option value="all">All scores</option>
            <option value="80">&ge; 80% (strong)</option>
            <option value="50">50&ndash;79% (possible)</option>
            <option value="0">&lt; 50% (unmatched)</option>
          </select>
          <button class="btn btn--ghost" id="auto-select-btn" title="Auto-select all matches with score &ge; 80%">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            Auto-select &ge;80%
          </button>
          <button class="btn btn--primary btn--sm" id="save-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            Save Selections
          </button>
          <button class="btn btn--ghost" id="download-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download JSON
          </button>
        </div>
      </div>
      <div id="results-container"></div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
