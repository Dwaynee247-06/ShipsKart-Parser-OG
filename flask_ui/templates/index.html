<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ShipsKart Parser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 680px; margin: 3rem auto; padding: 0 1.5rem;
      color: #1a1a1a; background: #f8f8f8;
    }
    h1 { font-size: 1.6rem; margin-bottom: .4rem; }
    p.sub { color: #555; font-size: .9rem; margin-bottom: 1.6rem; }
    .card {
      background: #fff; border: 1px solid #e0e0e0; border-radius: 10px;
      padding: 1.5rem 1.8rem;
    }
    label { display: block; font-weight: 600; font-size: .88rem; margin-bottom: .3rem; margin-top: .9rem; }
    input[type=file], input[type=number] {
      width: 100%; padding: .45rem .6rem; border: 1px solid #ccc;
      border-radius: 5px; font-size: .9rem;
    }
    .flags { display: flex; flex-wrap: wrap; gap: .7rem; margin-top: .5rem; }
    .flag-item {
      display: flex; align-items: center; gap: .35rem;
      font-size: .87rem; cursor: pointer;
    }
    .flag-item input { accent-color: #01696f; width:16px; height:16px; }
    .adv-box {
      border: 1px solid #ddd; border-radius: 7px;
      padding: .8rem 1rem; margin-top: .5rem; background: #fafafa;
    }
    .adv-box-title { font-weight: 600; font-size: .88rem; margin-bottom: .5rem; }
    button[type=submit] {
      margin-top: 1.3rem; width: 100%; padding: .6rem;
      background: #01696f; color: #fff; border: none;
      border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    button[type=submit]:hover { background: #015258; }
    .flash { background: #fdecea; color: #b00020; border-radius: 6px;
             padding: .6rem 1rem; margin-bottom: 1rem; font-size: .88rem; }
  </style>
</head>
<body>
  <h1>ShipsKart Parser</h1>
  <p class="sub">Upload a procurement document (Excel, PDF, Word) to extract and match items.</p>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
    {% endif %}
  {% endwith %}

  <div class="card">
    <form method="post" action="/upload" enctype="multipart/form-data">

      <label>Document file</label>
      <input type="file" name="file" accept=".xlsx,.xls,.pdf,.docx,.doc" required />

      <label>Top N matches per item</label>
      <input type="number" name="top_n" value="5" min="1" max="20" />

      <label style="margin-top:1rem;">
        <span style="display:flex;align-items:center;gap:.4rem;">
          <input type="checkbox" name="advanced" id="advChk" onchange="toggleAdv(this)" />
          Use advanced matcher
        </span>
      </label>

      <div class="adv-box" id="advBox" style="display:none;">
        <div class="adv-box-title">Advanced layers</div>
        <div class="flags">
          <label class="flag-item">
            <input type="checkbox" name="use_lev" checked />
            Levenshtein (typos)
          </label>
          <label class="flag-item">
            <input type="checkbox" name="use_tfidf" checked />
            TF-IDF (char n-grams)
          </label>
          <label class="flag-item">
            <input type="checkbox" name="use_inv" checked />
            Inverted index
          </label>
          <label class="flag-item">
            <input type="checkbox" name="use_phonetic" checked />
            Phonetic (Soundex)
          </label>
        </div>
      </div>

      <button type="submit">Parse &amp; Match</button>
    </form>
  </div>

  <script>
    function toggleAdv(chk) {
      document.getElementById('advBox').style.display = chk.checked ? 'block' : 'none';
    }
  </script>
</body>
</html>
