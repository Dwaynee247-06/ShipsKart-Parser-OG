<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}ShipsKart Parser{% endblock %}</title>

  <!-- Fonts -->
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>

  <style>
    /* ── Design tokens ─────────────────────────────────────── */
    :root, [data-theme="light"] {
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);

      --space-1:  0.25rem; --space-2:  0.5rem;  --space-3:  0.75rem;
      --space-4:  1rem;    --space-5:  1.25rem; --space-6:  1.5rem;
      --space-8:  2rem;    --space-10: 2.5rem;  --space-12: 3rem;

      --color-bg:             #f7f6f2;
      --color-surface:        #f9f8f5;
      --color-surface-2:      #fbfbf9;
      --color-surface-offset: #f0ede8;
      --color-divider:        #dcd9d5;
      --color-border:         #d4d1ca;
      --color-text:           #28251d;
      --color-text-muted:     #6b6a65;
      --color-text-faint:     #bab9b4;
      --color-text-inverse:   #f9f8f4;
      --color-primary:        #01696f;
      --color-primary-hover:  #0c4e54;
      --color-primary-active: #0f3638;
      --color-primary-hl:     #cedcd8;
      --color-success-bg:     #d4edda;
      --color-success-text:   #155724;
      --color-warning-bg:     #fff3cd;
      --color-warning-text:   #856404;
      --color-error-bg:       #f8d7da;
      --color-error-text:     #721c24;
      --color-info-bg:        #cce5ff;
      --color-info-text:      #004085;

      --radius-sm:  0.375rem;
      --radius-md:  0.5rem;
      --radius-lg:  0.75rem;
      --radius-xl:  1rem;
      --radius-full:9999px;
      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
      --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-body: 'Satoshi', system-ui, sans-serif;
      --content-narrow: 640px;
      --content-default: 960px;
      --content-wide: 1280px;
    }

    [data-theme="dark"] {
      --color-bg:             #171614;
      --color-surface:        #1c1b19;
      --color-surface-2:      #201f1d;
      --color-surface-offset: #1d1c1a;
      --color-divider:        #262523;
      --color-border:         #393836;
      --color-text:           #cdccca;
      --color-text-muted:     #797876;
      --color-text-faint:     #5a5957;
      --color-text-inverse:   #2b2a28;
      --color-primary:        #4f98a3;
      --color-primary-hover:  #227f8b;
      --color-primary-active: #1a626b;
      --color-primary-hl:     #313b3b;
      --color-success-bg:     #1a3a22;
      --color-success-text:   #6daa45;
      --color-warning-bg:     #3a2f10;
      --color-warning-text:   #e8af34;
      --color-error-bg:       #3a1a1a;
      --color-error-text:     #dd6974;
      --color-info-bg:        #0d2a40;
      --color-info-text:      #5591c7;
      --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
      --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
      --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
    }

    /* ── Base reset ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-sm);
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.6;
    }
    img, svg { display: block; max-width: 100%; }
    input, button, select, textarea { font: inherit; color: inherit; }
    button { cursor: pointer; background: none; border: none; }
    a, button, [role="button"] {
      transition: color var(--transition), background var(--transition),
                  border-color var(--transition), box-shadow var(--transition);
    }
    :focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 3px;
      border-radius: var(--radius-sm);
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Layout ────────────────────────────────────────────── */
    .app-header {
      position: sticky; top: 0; z-index: 50;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      box-shadow: var(--shadow-sm);
    }
    .header-inner {
      max-width: var(--content-wide);
      margin-inline: auto;
      padding: var(--space-3) var(--space-6);
      display: flex; align-items: center; gap: var(--space-3);
    }
    .logo {
      display: flex; align-items: center; gap: var(--space-2);
      text-decoration: none; color: var(--color-text);
      font-size: var(--text-base); font-weight: 700; letter-spacing: -0.01em;
    }
    .logo svg { color: var(--color-primary); }
    .header-spacer { flex: 1; }
    .theme-toggle {
      width: 36px; height: 36px; border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
    }
    .theme-toggle:hover { color: var(--color-text); background: var(--color-surface-offset); }

    .page-wrap {
      max-width: var(--content-wide);
      margin-inline: auto;
      padding: var(--space-8) var(--space-6);
    }
    @media (max-width: 640px) {
      .page-wrap { padding: var(--space-6) var(--space-4); }
      .header-inner { padding: var(--space-3) var(--space-4); }
    }

    /* ── Components ────────────────────────────────────────── */
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
    }
    .card-body { padding: var(--space-6) var(--space-8); }
    @media (max-width: 640px) { .card-body { padding: var(--space-5) var(--space-5); } }

    .btn {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-5);
      border-radius: var(--radius-md); font-weight: 600;
      font-size: var(--text-sm); text-decoration: none; line-height: 1.4;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--color-primary); color: var(--color-text-inverse);
      border: 1px solid transparent;
    }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-primary:active { background: var(--color-primary-active); }
    .btn-ghost {
      background: transparent; color: var(--color-text-muted);
      border: 1px solid var(--color-border);
    }
    .btn-ghost:hover { background: var(--color-surface-offset); color: var(--color-text); }
    .btn-full { width: 100%; justify-content: center; padding-block: var(--space-3); }

    .form-label {
      display: block; font-size: var(--text-xs); font-weight: 600;
      color: var(--color-text-muted); text-transform: uppercase;
      letter-spacing: 0.04em; margin-bottom: var(--space-1);
    }
    .form-input {
      width: 100%; padding: var(--space-2) var(--space-3);
      border: 1px solid var(--color-border); border-radius: var(--radius-md);
      background: var(--color-bg); font-size: var(--text-sm);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--color-primary) 18%, transparent);
      outline: none;
    }

    .alert {
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      display: flex; align-items: center; gap: var(--space-2);
    }
    .alert-error   { background: var(--color-error-bg);   color: var(--color-error-text); }
    .alert-success { background: var(--color-success-bg); color: var(--color-success-text); }
    .alert-info    { background: var(--color-info-bg);    color: var(--color-info-text); }

    .badge {
      display: inline-flex; align-items: center;
      padding: 0.1rem 0.45rem; border-radius: var(--radius-full);
      font-size: var(--text-xs); font-weight: 600;
      letter-spacing: 0.03em; text-transform: uppercase; white-space: nowrap;
    }
    .badge-confident { background: var(--color-success-bg); color: var(--color-success-text); }
    .badge-candidate { background: var(--color-warning-bg); color: var(--color-warning-text); }
    .badge-no_match  { background: var(--color-error-bg);   color: var(--color-error-text); }
    .badge-cached    { background: var(--color-info-bg);     color: var(--color-info-text); }
  </style>

  {% block head %}{% endblock %}
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <a href="/" class="logo" aria-label="ShipsKart Parser home">
      <!-- SVG logo: anchor + waveform mark -->
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
        <rect width="28" height="28" rx="7" fill="currentColor" class="logo-bg" style="color:var(--color-primary)"/>
        <path d="M7 14 Q10 9 14 14 Q18 19 21 14" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        <circle cx="14" cy="22" r="2" fill="white"/>
        <line x1="14" y1="20" x2="14" y2="16.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      ShipsKart Parser
    </a>
    <div class="header-spacer"></div>
    <button class="theme-toggle" data-theme-toggle aria-label="Switch to dark mode" title="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </div>
</header>

<main class="page-wrap">
  {% block content %}{% endblock %}
</main>

<script>
(function(){
  const t=document.querySelector('[data-theme-toggle]');
  const r=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  r.setAttribute('data-theme',d);
  t&&t.addEventListener('click',()=>{
    d=d==='dark'?'light':'dark';
    r.setAttribute('data-theme',d);
    t.setAttribute('aria-label','Switch to '+(d==='dark'?'light':'dark')+' mode');
    t.innerHTML=d==='dark'
      ?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      :'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  });
})();
</script>

{% block scripts %}{% endblock %}
</body>
</html>
